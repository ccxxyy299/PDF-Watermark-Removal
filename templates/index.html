<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 去水印工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        #upload-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .control-group label {
            min-width: 100px;
        }
        .control-group input[type="range"] {
            flex: 1;
        }
        .control-group .value {
            min-width: 40px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            display: none;
        }
        #message.show {
            display: block;
        }
        #download-link {
            display: none;
            margin-top: 10px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        #download-link.show {
            display: inline-block;
        }
        .tip {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h2>PDF 去水印工具</h2>
    <div id="upload-section">
        <input type="file" id="file-input" accept=".pdf">

        <div class="control-group">
            <label for="sensitivity">灵敏度:</label>
            <input type="range" id="sensitivity" min="1" max="100" value="50">
            <span class="value" id="sensitivity-value">50</span>
        </div>
        <p class="tip">灵敏度越高，水印去除越彻底，但可能影响内容清晰度</p>

        <button id="upload-btn">上传PDF文件</button>
        <button id="remove-watermark-btn" disabled>去除水印</button>
    </div>
    <p id="message"></p>
    <a id="download-link" href="#" download>下载处理后的PDF</a>

    <script>
        // 灵敏度滑块实时显示
        document.getElementById('sensitivity').addEventListener('input', (e) => {
            document.getElementById('sensitivity-value').textContent = e.target.value;
        });

        document.getElementById('file-input').addEventListener('change', () => {
            const fileInput = document.getElementById('file-input');
            if (fileInput.files.length === 0) {
                document.getElementById('upload-btn').innerText = '选择PDF文件';
                document.getElementById('remove-watermark-btn').disabled = true;
            } else {
                document.getElementById('upload-btn').innerText = '开始上传';
                document.getElementById('remove-watermark-btn').disabled = false;
            }
        });

        document.getElementById('upload-btn').addEventListener('click', async () => {
            if (!document.getElementById('file-input').files.length) return;

            const formData = new FormData();
            formData.append('file', document.getElementById('file-input').files[0]);

            try {
                await fetch('/upload', { method: 'POST', body: formData });
                document.getElementById('message').textContent = '文件上传成功';
                document.getElementById('message').classList.add('show');
                document.getElementById('remove-watermark-btn').innerText = '去除水印并生成无水印PDF';
            } catch (error) {
                console.error('Error uploading file:', error);
            }
        });

        document.getElementById('remove-watermark-btn').addEventListener('click', async () => {
            const sensitivity = document.getElementById('sensitivity').value;
            try {
                document.getElementById('message').textContent = '处理中，请稍候...';
                document.getElementById('message').classList.add('show');

                await fetch(`/remove_watermark?sensitivity=${sensitivity}`);
                document.getElementById('message').textContent = '水印去除成功！';
                document.getElementById('download-link').href = '/download';
                document.getElementById('download-link').classList.add('show');
            } catch (error) {
                console.error('Error removing watermark:', error);
                document.getElementById('message').textContent = '处理失败，请重试';
            }
        });
    </script>
</body>
</html>
